<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXELPIGS • $OINK</title>
  <meta name="description" content="$OINK — PixelPigs community token on Robinhood Chain.">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap">
  <script src="https://unpkg.com/ethers@6.13.2/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg:#000000; --card:#121212;
      --pig:#FFBC94; --pig-dim:#E8A070;
      --rh-green:#CCFF00; --rh-green-dim:#A3CC00;
      --muted:#6b6b6b; --border:#1e1e1e; --text:#ffffff;
    }
    html, body { height:100%; margin:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:"Press Start 2P", system-ui, sans-serif; font-size:11px;
      display:flex; flex-direction:column; overflow:hidden;
    }
    .container { max-width:520px; margin:0 auto; padding:0 20px; width:100%; box-sizing:border-box; }

    nav { flex-shrink:0; border-bottom:2px solid var(--rh-green); padding:10px 0; }
    .nav { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .logo { font-size:12px; letter-spacing:1px; text-decoration:none; color:var(--text); }
    .logo:hover { color:var(--rh-green); }
    .btn-wallet {
      padding:7px 12px; width:auto; font-size:8px; border:2px solid var(--rh-green);
      background:var(--rh-green); color:#000; font-family:inherit; cursor:pointer;
    }
    .btn-wallet.is-connected { background:transparent; color:var(--rh-green); }

    .page { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:16px 0; }

    .claim-section {
      background:var(--card); border:2px solid var(--pig);
      padding:clamp(14px,2.5vw,22px); width:100%;
    }
    .claim-head { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:10px; }
    .claim-head h1 { margin:0; font-size:11px; letter-spacing:1px; color:var(--pig); text-shadow:2px 2px 0 var(--pig-dim); }
    .claim-meta { font-size:7px; color:var(--muted); line-height:1.6; text-align:right; }

    .stat-row { display:flex; justify-content:space-between; font-size:8px; margin:6px 0; gap:8px; }
    .stat-row .val { color:var(--pig); text-align:right; }

    .pig-list {
      max-height:100px; overflow-y:auto; font-size:7px; color:var(--muted);
      border:1px solid var(--border); padding:8px; margin:10px 0; line-height:1.7;
    }
    .pig-list .leg { color:var(--pig); }

    .ca-line { font-size:6px; color:var(--muted); margin:8px 0; line-height:1.6; word-break:break-all; }
    .ca-line a { color:var(--pig); text-decoration:none; }
    .ca-line a:hover { text-decoration:underline; }

    .btn {
      background:var(--pig); color:#000; border:none; padding:12px 16px;
      font-family:inherit; font-size:10px; font-weight:bold; cursor:pointer; width:100%;
    }
    .btn:hover { background:var(--pig-dim); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }

    .status-row { margin-top:10px; font-size:7px; line-height:1.5; }
    .status { padding:8px; background:var(--bg); border:1px solid var(--border); font-size:7px; line-height:1.5; }
    .warn { color:#ffaa00; }
    .accent { color:var(--pig); }
    .muted { color:var(--muted); }

    #view-oink-tx { display:none; font-size:7px; color:var(--pig); margin-top:6px; text-decoration:none; }
    #view-oink-tx.show { display:inline-block; }
    #view-oink-tx:hover { text-decoration:underline; }

    .wallet-modal {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,0.85); align-items:center; justify-content:center; padding:20px;
    }
    .wallet-modal.open { display:flex; }
    .wallet-sheet {
      background:var(--card); border:2px solid var(--rh-green); padding:18px;
      width:min(360px,100%); max-height:80vh; overflow-y:auto;
    }
    .wallet-sheet h3 { font-size:9px; margin:0 0 4px; color:var(--rh-green); }
    .wallet-sheet p { font-size:7px; color:var(--muted); margin:0 0 12px; line-height:1.6; }
    .wallet-opt {
      display:flex; align-items:center; gap:10px; width:100%; text-align:left;
      background:var(--bg); border:2px solid var(--border); color:var(--text);
      padding:10px 12px; margin-bottom:8px; cursor:pointer; font-family:inherit; font-size:8px;
    }
    .wallet-opt:hover { border-color:var(--rh-green); color:var(--rh-green); }
    .wallet-opt img { width:24px; height:24px; border-radius:4px; object-fit:contain; }
    .wallet-close {
      background:transparent; border:2px solid var(--border); color:var(--muted);
      padding:8px 12px; width:100%; font-family:inherit; font-size:8px; cursor:pointer; margin-top:4px;
    }
    .wallet-close:hover { border-color:var(--muted); color:var(--text); }

    @media (max-width:720px) {
      body { overflow-y:auto; height:auto; min-height:100dvh; }
      .page { align-items:flex-start; padding:20px 0 32px; }
      .claim-meta { text-align:left; }
    }
  </style>
</head>
<body>

<nav>
  <div class="container nav">
    <a class="logo" href="index.html">PIXELPIGS</a>
    <button type="button" class="btn-wallet" id="wallet-btn">CONNECT WALLET</button>
  </div>
</nav>

<main class="page">
  <div class="container claim-section">
    <div class="claim-head">
      <h1>$OINK</h1>
      <div class="claim-meta">100k per pig<br>300k legendary</div>
    </div>

    <div class="stat-row"><span>unclaimed pigs</span><span class="val" id="pig-count">—</span></div>
    <div class="stat-row"><span>claimable</span><span class="val" id="claimable">—</span></div>
    <div class="stat-row"><span>your balance</span><span class="val" id="oink-bal">—</span></div>

    <div class="pig-list" id="pig-list">connect wallet</div>

    <div class="ca-line">
      OINK <a href="https://robinhoodchain.blockscout.com/address/0xF2c5F81F291E80BFC59e66E6D027C23471ED745b" target="_blank" rel="noopener">0xF2c5…745b</a>
    </div>

    <button type="button" class="btn" id="claim-btn" disabled>CLAIM OINK</button>

    <div class="status-row">
      <div class="status muted" id="status">connect wallet on robinhood chain</div>
      <a id="view-oink-tx" href="#" target="_blank" rel="noopener">view oink tx →</a>
    </div>
    <p style="font-size:6px;margin:10px 0 0;text-align:center"><a href="faq.html" style="color:var(--muted);text-decoration:none">faq — robinhood chain</a></p>
  </div>
</main>

<div class="wallet-modal" id="wallet-modal" role="dialog" aria-label="Choose wallet">
  <div class="wallet-sheet">
    <h3>CONNECT WALLET</h3>
    <p>Robinhood Chain (4663). Pick MetaMask, OKX, Rabby, or another EVM wallet.</p>
    <div id="wallet-options"></div>
    <button type="button" class="wallet-close" id="wallet-close">cancel</button>
  </div>
</div>

<script>
  const PIGS_ADDRESS = "0xc51e0a920133D1491Db4ee4BA461e0BE77B4b3b8";
  const OINK_ADDRESS = "0xF2c5F81F291E80BFC59e66E6D027C23471ED745b";
  const CLAIM_ADDRESS = "0x51fA1E5fD4B0B2F0318B0cE712d1958010A4265f";
  const RPC_URL = "https://rpc.mainnet.chain.robinhood.com";
  const CHAIN_ID = 4663;
  const EXPLORER = "https://robinhoodchain.blockscout.com";

  const LEGENDARY = new Set([1, 43, 70, 421, 501, 778, 889, 1002, 1338, 2025, 3142, 3333]);

  const PIGS_ABI = [
    "function ownerOf(uint256) view returns (address)",
    "function totalSupply() view returns (uint256)"
  ];
  const OINK_ABI = ["function balanceOf(address) view returns (uint256)"];
  const CLAIM_ABI = [
    "function claim(uint256[] tokenIds)",
    "function claimableFor(address holder, uint256 tokenId) view returns (uint256)",
    "function paused() view returns (bool)"
  ];

  let walletProvider = null;
  let provider, signer, userAddress;
  let claimableIds = [];
  let claimableTotal = 0n;

  const eip6963Providers = [];
  window.addEventListener("eip6963:announceProvider", (event) => {
    if (!event.detail?.provider) return;
    const exists = eip6963Providers.some(
      (p) => p.info?.uuid === event.detail.info?.uuid || p.provider === event.detail.provider
    );
    if (!exists) eip6963Providers.push(event.detail);
  });
  window.dispatchEvent(new Event("eip6963:requestProvider"));

  const ROBINHOOD_CHAIN = {
    chainId: "0x1237",
    chainName: "Robinhood Chain",
    nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
    rpcUrls: [RPC_URL],
    blockExplorerUrls: [EXPLORER]
  };

  function fmtOink(wei) {
    const n = Number(ethers.formatEther(wei));
    return n.toLocaleString("en-US", { maximumFractionDigits: 0 }) + " OINK";
  }

  function shortAddr(a) {
    return a ? `${a.slice(0, 6)}…${a.slice(-4)}` : "";
  }

  function setStatus(msg, cls = "muted") {
    document.getElementById("status").className = `status ${cls}`;
    document.getElementById("status").textContent = msg;
  }

  function hideViewTx() {
    const link = document.getElementById("view-oink-tx");
    link.classList.remove("show");
    link.href = "#";
  }

  function showViewTx(hash) {
    const link = document.getElementById("view-oink-tx");
    link.href = `${EXPLORER}/tx/${hash}`;
    link.classList.add("show");
  }

  function providerLabel(p) {
    if (p.isMetaMask) return "MetaMask";
    if (p.isOkxWallet || p.isOKExWallet) return "OKX Wallet";
    if (p.isRabby) return "Rabby";
    if (p.isCoinbaseWallet) return "Coinbase Wallet";
    if (p.isBraveWallet) return "Brave Wallet";
    return "Browser Wallet";
  }

  function collectWallets() {
    const seen = new Set();
    const list = [];
    function add(provider, name, icon) {
      if (!provider || seen.has(provider)) return;
      seen.add(provider);
      list.push({ provider, name: name || "Wallet", icon: icon || "" });
    }
    for (const detail of eip6963Providers) {
      add(detail.provider, detail.info?.name, detail.info?.icon);
    }
    if (window.ethereum?.providers?.length) {
      for (const p of window.ethereum.providers) add(p, providerLabel(p), null);
    } else if (window.ethereum) {
      add(window.ethereum, providerLabel(window.ethereum), null);
    }
    if (window.rabby) add(window.rabby, "Rabby", null);
    if (window.coinbaseWalletExtension) add(window.coinbaseWalletExtension, "Coinbase Wallet", null);
    return list;
  }

  function closeWalletModal() {
    document.getElementById("wallet-modal").classList.remove("open");
  }

  async function openWalletModal() {
    window.dispatchEvent(new Event("eip6963:requestProvider"));
    await new Promise((r) => setTimeout(r, 120));
    const container = document.getElementById("wallet-options");
    container.innerHTML = "";
    const options = collectWallets();
    if (!options.length) {
      container.innerHTML = '<p style="font-size:7px;color:#ffaa00;line-height:1.6">No wallet found. Install MetaMask, OKX, or Rabby.</p>';
    } else {
      for (const opt of options) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "wallet-opt";
        const icon = opt.icon
          ? `<img src="${opt.icon}" alt="" width="24" height="24">`
          : `<span style="width:24px;text-align:center">◎</span>`;
        btn.innerHTML = `${icon}<span>${opt.name}</span>`;
        btn.addEventListener("click", () => connectWithProvider(opt.provider));
        container.appendChild(btn);
      }
    }
    document.getElementById("wallet-modal").classList.add("open");
  }

  function bindWalletEvents(eth) {
    if (!eth?.on || eth._oinkBound) return;
    eth._oinkBound = true;
    eth.on("accountsChanged", (accounts) => {
      if (!accounts?.length) disconnect();
      else {
        userAddress = accounts[0];
        document.getElementById("wallet-btn").textContent = shortAddr(userAddress);
        refresh();
      }
    });
    eth.on("chainChanged", () => location.reload());
  }

  function disconnect() {
    walletProvider = null;
    signer = null;
    userAddress = null;
    document.getElementById("wallet-btn").textContent = "CONNECT WALLET";
    document.getElementById("wallet-btn").classList.remove("is-connected");
    hideViewTx();
    setStatus("connect wallet on robinhood chain", "muted");
    document.getElementById("pig-count").textContent = "—";
    document.getElementById("claimable").textContent = "—";
    document.getElementById("oink-bal").textContent = "—";
    document.getElementById("pig-list").textContent = "connect wallet";
    document.getElementById("claim-btn").disabled = true;
    document.getElementById("claim-btn").textContent = "CLAIM OINK";
  }

  async function ensureChain(eth) {
    const chain = await eth.request({ method: "eth_chainId" });
    if (parseInt(chain, 16) !== CHAIN_ID) {
      try {
        await eth.request({ method: "wallet_switchEthereumChain", params: [{ chainId: ROBINHOOD_CHAIN.chainId }] });
      } catch (e) {
        if (e.code === 4902) {
          await eth.request({ method: "wallet_addEthereumChain", params: [ROBINHOOD_CHAIN] });
        } else throw e;
      }
    }
  }

  async function connectWithProvider(eth) {
    closeWalletModal();
    hideViewTx();
    try {
      await ensureChain(eth);
      const accounts = await eth.request({ method: "eth_requestAccounts" });
      walletProvider = eth;
      bindWalletEvents(eth);
      provider = new ethers.BrowserProvider(eth);
      signer = await provider.getSigner();
      userAddress = accounts[0];
      document.getElementById("wallet-btn").textContent = shortAddr(userAddress);
      document.getElementById("wallet-btn").classList.add("is-connected");
      await refresh();
    } catch (err) {
      const msg = err?.message || String(err);
      setStatus(/user rejected|denied/i.test(msg) ? "cancelled in wallet" : msg, "warn");
    }
  }

  async function onWalletClick() {
    if (userAddress) { disconnect(); return; }
    await openWalletModal();
  }

  async function scanClaimable() {
    if (!userAddress) return;

    setStatus("scanning pigs…", "muted");
    document.getElementById("claim-btn").disabled = true;

    const pigs = new ethers.Contract(PIGS_ADDRESS, PIGS_ABI, provider);
    const claim = new ethers.Contract(CLAIM_ADDRESS, CLAIM_ABI, provider);

    try {
      if (await claim.paused()) {
        setStatus("claims paused", "warn");
        return;
      }

      const supply = Number(await pigs.totalSupply());
      claimableIds = [];
      claimableTotal = 0n;
      const lines = [];

      for (let id = 1; id <= supply; id++) {
        try {
          const owner = await pigs.ownerOf(id);
          if (owner.toLowerCase() !== userAddress.toLowerCase()) continue;
          const amount = await claim.claimableFor(userAddress, id);
          if (amount === 0n) continue;
          claimableIds.push(id);
          claimableTotal += amount;
          const leg = LEGENDARY.has(id) ? ' class="leg"' : "";
          lines.push(`<span${leg}>#${id} ${fmtOink(amount)}</span>`);
        } catch { /* skip */ }
      }

      document.getElementById("pig-count").textContent = String(claimableIds.length);
      document.getElementById("claimable").textContent = claimableIds.length ? fmtOink(claimableTotal) : "0 OINK";
      document.getElementById("pig-list").innerHTML = lines.length
        ? lines.join("<br>")
        : (supply === 0 ? "no pigs minted yet" : "nothing to claim");

      document.getElementById("claim-btn").disabled = claimableIds.length === 0;
      setStatus(claimableIds.length ? "ready to claim" : "no unclaimed pigs", claimableIds.length ? "accent" : "muted");
    } catch (err) {
      console.error(err);
      setStatus("scan failed — reconnect wallet", "warn");
      document.getElementById("pig-list").textContent = "scan failed";
    }
  }

  async function refresh() {
    if (!userAddress) return;

    const oink = new ethers.Contract(OINK_ADDRESS, OINK_ABI, provider);
    try {
      document.getElementById("oink-bal").textContent = fmtOink(await oink.balanceOf(userAddress));
    } catch {
      document.getElementById("oink-bal").textContent = "—";
    }

    await scanClaimable();
  }

  async function claimOink() {
    if (!signer || claimableIds.length === 0) return;
    const btn = document.getElementById("claim-btn");
    const claimedAmount = claimableTotal;
    const claimedCount = claimableIds.length;

    hideViewTx();
    btn.disabled = true;
    btn.textContent = "CONFIRM IN WALLET...";
    setStatus("confirm in wallet…", "muted");

    try {
      const claim = new ethers.Contract(CLAIM_ADDRESS, CLAIM_ABI, signer);
      const tx = await claim.claim(claimableIds);
      btn.textContent = "CLAIMING...";
      setStatus("confirming claim…", "muted");
      const receipt = await tx.wait();
      const hash = receipt?.hash || tx.hash;

      showViewTx(hash);
      setStatus(`claimed ${fmtOink(claimedAmount)} · ${claimedCount} pig${claimedCount === 1 ? "" : "s"}`, "accent");
      btn.textContent = "CLAIM OINK";
      await refresh();
    } catch (err) {
      const msg = err?.reason || err?.shortMessage || err?.message || "claim failed";
      setStatus(/user rejected|denied/i.test(msg) ? "cancelled in wallet" : msg, "warn");
      btn.textContent = "CLAIM OINK";
      btn.disabled = claimableIds.length === 0;
      await refresh();
    }
  }

  document.getElementById("wallet-btn").addEventListener("click", onWalletClick);
  document.getElementById("wallet-close").addEventListener("click", closeWalletModal);
  document.getElementById("wallet-modal").addEventListener("click", (e) => {
    if (e.target.id === "wallet-modal") closeWalletModal();
  });
  document.getElementById("claim-btn").addEventListener("click", claimOink);

  provider = new ethers.JsonRpcProvider(RPC_URL);
</script>
</body>
</html>
